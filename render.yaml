services:
  - type: web
    name: ryno-h-creations-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: "cd artifacts/api-server && npm install --legacy-peer-deps && npm run build"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: rynohcreations@gmail.com
      - key: ADMIN_PASSWORD
        value: Ryno@9577
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ryno-h-creations-db
          property: connectionString

databases:
  - name: ryno-h-creations-db
    databaseName: ryno_h_creations
    plan: free
    region: frankfurt
